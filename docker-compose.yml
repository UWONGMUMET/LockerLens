services:
  db:
    image: postgres:16-alpine
    container_name: lokerlens-postgres
    environment:
      POSTGRES_DB: lokerlens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - lokerlens_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lokerlens"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lokerlens_postgres_data:
